<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人书签导航</title>
    <!-- 预连接favicon服务，加快图标加载 -->
    <link rel="preconnect" href="https://www.google.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        dark: '#0f172a',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .drag-over {
                background-color: rgba(59, 130, 246, 0.3) !important;
                border: 2px dashed #3b82f6 !important;
            }
            .dragging {
                opacity: 0.5;
                transform: scale(0.95);
            }
        }
    </style>
</head>
<body class="relative overflow-x-hidden text-white">
    <!-- 星空背景：改用Canvas绘制，大幅减少DOM节点，降低内存占用 -->
    <canvas id="stars-canvas" class="fixed inset-0 -z-10 bg-gradient-to-b from-dark via-[#1a1f3a] to-[#2d3a6b]"></canvas>

    <!-- 加载提示 -->
    <div id="loading" class="fixed inset-0 flex items-center justify-center z-50 bg-dark/80">
        <div class="text-center">
            <i class="fa fa-spinner fa-spin text-4xl mb-3"></i>
            <p>正在加载你的书签数据...</p>
        </div>
    </div>

    <!-- WebDAV设置弹窗 -->
    <div id="webdav-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-white/20 backdrop-blur-sm rounded-xl p-6 w-full max-w-md mx-4 shadow-2xl">
            <h3 class="text-xl font-bold text-white mb-4">同步设置（国内可用）</h3>
            <p class="text-sm text-white/80 mb-4">使用国内云盘的WebDAV同步，推荐用坚果云，国内访问速度快，完全可用</p>
            <form id="webdav-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-white/90 mb-1">WebDAV地址</label>
                    <input type="text" id="webdav-url" required placeholder="比如：https://dav.jianguoyun.com/dav/" class="w-full px-3 py-2 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 bg-white/10 text-white placeholder-white/60">
                </div>
                <div>
                    <label class="block text-sm font-medium text-white/90 mb-1">账号</label>
                    <input type="text" id="webdav-username" required class="w-full px-3 py-2 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 bg-white/10 text-white placeholder-white/60">
                </div>
                <div>
                    <label class="block text-sm font-medium text-white/90 mb-1">密码</label>
                    <input type="password" id="webdav-password" required class="w-full px-3 py-2 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 bg-white/10 text-white placeholder-white/60">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" id="close-webdav-btn" class="flex-1 py-2 px-4 border border-white/20 rounded-lg text-white hover:bg-white/10 transition">取消</button>
                    <button type="submit" class="flex-1 py-2 px-4 bg-primary text-white rounded-lg hover:bg-primary/90 transition">保存并连接</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 侧边栏 -->
    <aside class="fixed left-0 top-0 h-full w-56 bg-white/5 backdrop-blur-sm p-4 overflow-y-auto hidden" id="sidebar">
        <div class="flex items-center gap-2 mb-8">
            <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
                <i class="fa fa-bookmark text-white"></i>
            </div>
            <h1 class="text-xl font-bold">我的书签</h1>
        </div>
        <ul id="category-list" class="space-y-1">
            <!-- 分类会动态生成 -->
        </ul>
        <div class="mt-4 pt-4 border-t border-white/10 space-y-2">
            <button id="webdav-setting-btn" class="w-full py-2 px-3 rounded-lg bg-white/10 hover:bg-white/20 transition text-sm flex items-center gap-2">
                <i class="fa fa-cloud"></i> 同步设置
            </button>
            <button id="add-category-btn" class="w-full py-2 px-3 rounded-lg bg-white/10 hover:bg-white/20 transition text-sm flex items-center gap-2">
                <i class="fa fa-plus"></i> 添加分类
            </button>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="ml-56 p-6 hidden" id="main-content">
        <!-- 顶部搜索栏 -->
        <div class="max-w-3xl mx-auto mb-8">
            <div class="relative">
                <input 
                    type="text" 
                    id="search-input"
                    placeholder="搜索书签、网址..."
                    class="w-full py-3 px-5 pl-12 rounded-full bg-white/10 backdrop-blur-sm border border-white/10 text-white placeholder-white/80 focus:outline-none focus:ring-2 focus:ring-primary/50 transition"
                >
                <i class="fa fa-search absolute left-5 top-1/2 -translate-y-1/2 text-white/80"></i>
            </div>
        </div>

        <!-- 书签列表 -->
        <div class="mb-6 flex justify-between items-center">
            <h2 id="current-category-title" class="text-2xl font-bold">全部书签</h2>
            <div class="flex gap-2">
                <button id="import-bookmark-btn" class="py-2 px-4 rounded-lg bg-white/10 hover:bg-white/20 transition flex items-center gap-2">
                    <i class="fa fa-upload"></i> 导入书签
                </button>
                <input type="file" id="import-file-input" accept=".html" class="hidden">
                <button id="add-bookmark-btn" class="py-2 px-4 rounded-lg bg-primary hover:bg-primary/90 transition flex items-center gap-2">
                    <i class="fa fa-plus"></i> 添加书签
                </button>
            </div>
        </div>
        <div id="bookmark-grid" class="space-y-8">
            <!-- 书签卡片会动态生成 -->
        </div>
    </main>

    <!-- 添加/编辑书签弹窗 -->
    <div id="bookmark-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-white/20 backdrop-blur-sm rounded-xl p-6 w-full max-w-md mx-4 shadow-2xl">
            <h3 id="modal-title" class="text-xl font-bold text-white mb-4">添加新书签</h3>
            <form id="bookmark-form" class="space-y-4">
                <input type="hidden" id="bookmark-id">
                <div>
                    <label class="block text-sm font-medium text-white/90 mb-1">网站名称</label>
                    <input type="text" id="bookmark-name" required class="w-full px-3 py-2 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 bg-white/10 text-white placeholder-white/60">
                </div>
                <div>
                    <label class="block text-sm font-medium text-white/90 mb-1">网站地址</label>
                    <input type="url" id="bookmark-url" required placeholder="https://..." class="w-full px-3 py-2 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 bg-white/10 text-white placeholder-white/60">
                </div>
                <div>
                    <label class="block text-sm font-medium text-white/90 mb-1">分类</label>
                    <select id="bookmark-category" required class="w-full px-3 py-2 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 bg-white/10 text-white">
                        <!-- 分类选项动态生成 -->
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-white/90 mb-1">描述（可选）</label>
                    <textarea id="bookmark-desc" rows="2" class="w-full px-3 py-2 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 bg-white/10 text-white placeholder-white/60"></textarea>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" id="close-modal-btn" class="flex-1 py-2 px-4 border border-white/20 rounded-lg text-white hover:bg-white/10 transition">取消</button>
                    <button type="submit" class="flex-1 py-2 px-4 bg-primary text-white rounded-lg hover:bg-primary/90 transition">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 添加分类弹窗 -->
    <div id="category-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-white/20 backdrop-blur-sm rounded-xl p-6 w-full max-w-md mx-4 shadow-2xl">
            <h3 class="text-xl font-bold text-white mb-4">添加新分类</h3>
            <form id="category-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-white/90 mb-1">分类名称</label>
                    <input type="text" id="category-name" required class="w-full px-3 py-2 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 bg-white/10 text-white placeholder-white/60">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" id="close-category-modal-btn" class="flex-1 py-2 px-4 border border-white/20 rounded-lg text-white hover:bg-white/10 transition">取消</button>
                    <button type="submit" class="flex-1 py-2 px-4 bg-primary text-white rounded-lg hover:bg-primary/90 transition">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 数据初始化
        let bookmarks = [];
        let categories = ['常用工具', '学习资源', '娱乐网站', '工作相关'];
        let currentCategory = 'all';
        let searchKeyword = '';
        let draggedBookmarkId = null;
        let webdavConfig = JSON.parse(localStorage.getItem('webdav_config') || 'null');
        let syncTimer = null;

        // Canvas星空背景：大幅优化性能，减少DOM节点和内存占用
        function initStarCanvas() {
            const canvas = document.getElementById('stars-canvas');
            const ctx = canvas.getContext('2d');
            
            // 适配屏幕大小
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // 生成星星数据
            const stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height * 0.7,
                    size: Math.random() * 2 + 1,
                    opacity: Math.random() * 0.5 + 0.5,
                    speed: (Math.random() * 0.02 + 0.01)
                });
            }

            // 动画循环
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                stars.forEach(star => {
                    // 闪烁效果
                    star.opacity += star.speed;
                    if (star.opacity > 1 || star.opacity < 0.2) {
                        star.speed = -star.speed;
                    }
                    
                    // 绘制星星
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                    ctx.fill();
                });

                requestAnimationFrame(animate);
            }
            animate();
        }

        // 获取网站图标
        function getFavicon(url) {
            try {
                const domain = new URL(url).hostname;
                return `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;
            } catch (e) {
                return '';
            }
        }

        // 保存到WebDAV
        async function saveToWebDAV() {
            if (!webdavConfig) return;
            try {
                const data = JSON.stringify({
                    bookmarks,
                    categories,
                    updatedAt: Date.now()
                });
                const auth = btoa(`${webdavConfig.username}:${webdavConfig.password}`);
                const url = webdavConfig.url.endsWith('/') ? webdavConfig.url : webdavConfig.url + '/';
                // 上传文件到WebDAV
                await fetch(url + 'bookmark-data.json', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Basic ${auth}`,
                        'Content-Type': 'application/json'
                    },
                    body: data
                });
            } catch (e) {
                console.error('WebDAV保存失败', e);
            }
        }

        // 从WebDAV加载
        async function loadFromWebDAV() {
            if (!webdavConfig) return false;
            try {
                const auth = btoa(`${webdavConfig.username}:${webdavConfig.password}`);
                const url = webdavConfig.url.endsWith('/') ? webdavConfig.url : webdavConfig.url + '/';
                const res = await fetch(url + 'bookmark-data.json', {
                    headers: {
                        'Authorization': `Basic ${auth}`
                    }
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.bookmarks) bookmarks = data.bookmarks;
                    if (data.categories) categories = data.categories;
                    return true;
                }
            } catch (e) {
                console.error('WebDAV加载失败', e);
            }
            return false;
        }

        // 触发同步
        function triggerSync() {
            // 防抖，避免频繁同步
            if (syncTimer) clearTimeout(syncTimer);
            syncTimer = setTimeout(async () => {
                await saveToWebDAV();
            }, 1000);
        }

        // 删除分类
        async function deleteCategory(categoryName) {
            if (categoryName === 'all') return;
            // 不能删除最后一个分类
            if (categories.length <= 1) {
                alert('至少需要保留一个分类哦~');
                return;
            }
            if (!confirm(`确定要删除分类「${categoryName}」吗？该分类下的书签会自动移到「常用工具」分类中。`)) return;

            // 把该分类下的书签移到常用工具
            bookmarks.forEach(bookmark => {
                if (bookmark.category === categoryName) {
                    bookmark.category = '常用工具';
                }
            });

            // 删除分类
            categories = categories.filter(c => c !== categoryName);
            // 如果当前选中的是这个分类，切换到全部
            if (currentCategory === categoryName) {
                currentCategory = 'all';
            }

            // 保存
            saveData();
            renderCategories();
            renderBookmarks();
        }

        // 处理书签拖拽到分类
        function handleDropToCategory(categoryName) {
            if (!draggedBookmarkId) return;
            // 找到书签
            const bookmark = bookmarks.find(b => b.id === draggedBookmarkId);
            if (!bookmark) return;
            // 如果已经是这个分类，不用改
            if (bookmark.category === categoryName) return;
            // 修改分类
            bookmark.category = categoryName;
            // 保存
            saveData();
            // 重置
            draggedBookmarkId = null;
            // 刷新
            renderCategories();
            renderBookmarks();
        }

        // 渲染分类列表
        function renderCategories() {
            const categoryList = document.getElementById('category-list');
            const categorySelect = document.getElementById('bookmark-category');
            
            // 清空
            categoryList.innerHTML = '';
            categorySelect.innerHTML = '';

            // 添加全部选项
            const allItem = document.createElement('li');
            allItem.innerHTML = `
                <button data-category="all" class="w-full text-left py-2 px-3 rounded-lg ${currentCategory === 'all' ? 'bg-primary/20 text-primary' : 'hover:bg-white/10'} transition flex items-center gap-2 group">
                    <i class="fa fa-th-large"></i> 全部书签
                </button>
            `;
            categoryList.appendChild(allItem);

            // 遍历分类
            categories.forEach(cat => {
                // 侧边栏项
                const item = document.createElement('li');
                item.className = 'group relative';
                item.innerHTML = `
                    <button data-category="${cat}" class="category-drop-target w-full text-left py-2 px-3 rounded-lg ${currentCategory === cat ? 'bg-primary/20 text-primary' : 'hover:bg-white/10'} transition flex items-center gap-2 pr-8" data-category-name="${cat}">
                        <i class="fa fa-folder-o"></i> ${cat}
                    </button>
                    <button data-delete-category="${cat}" class="absolute right-2 top-1/2 -translate-y-1/2 w-5 h-5 rounded-full bg-white/10 hover:bg-red-500/30 flex items-center justify-center text-white/70 hover:text-red-300 opacity-0 group-hover:opacity-100 transition">
                        <i class="fa fa-times text-xs"></i>
                    </button>
                `;
                categoryList.appendChild(item);

                // 下拉选项
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                categorySelect.appendChild(option);
            });

            // 绑定分类点击事件
            categoryList.querySelectorAll('[data-category]').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentCategory = btn.dataset.category;
                    renderCategories();
                    renderBookmarks();
                });
            });

            // 绑定分类删除事件
            categoryList.querySelectorAll('[data-delete-category]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteCategory(btn.dataset.deleteCategory);
                });
            });

            // 绑定拖拽事件
            categoryList.querySelectorAll('.category-drop-target').forEach(target => {
                target.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    target.classList.add('drag-over');
                });
                target.addEventListener('dragleave', () => {
                    target.classList.remove('drag-over');
                });
                target.addEventListener('drop', (e) => {
                    e.preventDefault();
                    target.classList.remove('drag-over');
                    handleDropToCategory(target.dataset.categoryName);
                });
            });
        }

        // 渲染书签列表
        function renderBookmarks() {
            const grid = document.getElementById('bookmark-grid');
            const title = document.getElementById('current-category-title');
            
            // 更新标题
            title.textContent = currentCategory === 'all' ? '全部书签' : currentCategory;

            // 清空
            grid.innerHTML = '';

            // 过滤书签
            let filtered = bookmarks;
            // 搜索过滤
            if (searchKeyword) {
                const kw = searchKeyword.toLowerCase();
                filtered = filtered.filter(b => 
                    b.name.toLowerCase().includes(kw) || 
                    b.desc?.toLowerCase().includes(kw) || 
                    b.url.toLowerCase().includes(kw)
                );
            }

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12 text-white">
                        <i class="fa fa-folder-open-o text-4xl mb-3"></i>
                        <p>暂无书签，点击右上角添加你的第一个书签吧~</p>
                    </div>
                `;
                return;
            }

            // 如果是全部书签，按分类分组显示
            if (currentCategory === 'all') {
                categories.forEach(cat => {
                    const catBookmarks = filtered.filter(b => b.category === cat);
                    if (catBookmarks.length === 0) return;

                    // 分类分组容器
                    const group = document.createElement('div');
                    group.className = 'category-group';
                    
                    // 分类标题（也可以作为拖拽目标）
                    const groupTitle = document.createElement('h3');
                    groupTitle.className = 'category-drop-target text-lg font-semibold mb-4 pb-2 border-b border-white/20 flex items-center gap-2';
                    groupTitle.dataset.categoryName = cat;
                    groupTitle.innerHTML = `<i class="fa fa-folder-o"></i> ${cat} <span class="text-sm text-white/60">(${catBookmarks.length})</span>`;
                    group.appendChild(groupTitle);

                    // 书签网格
                    const catGrid = document.createElement('div');
                    catGrid.className = 'grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4';

                    // 渲染该分类的书签
                    catBookmarks.forEach(bookmark => {
                        const card = document.createElement('div');
                        card.className = 'bg-white/20 backdrop-blur-sm rounded-xl p-4 shadow-lg hover:shadow-xl hover:bg-white/30 transition group relative cursor-move';
                        card.draggable = true;
                        card.dataset.bookmarkId = bookmark.id;
                        card.innerHTML = `
                            <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition flex gap-1">
                                <button data-edit="${bookmark.id}" class="w-6 h-6 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-white">
                                    <i class="fa fa-pencil text-xs"></i>
                                </button>
                                <button data-delete="${bookmark.id}" class="w-6 h-6 rounded-full bg-white/10 hover:bg-red-500/30 flex items-center justify-center text-white hover:text-red-300">
                                    <i class="fa fa-trash text-xs"></i>
                                </button>
                            </div>
                            <a href="${bookmark.url}" target="_blank" class="block" onclick="event.stopPropagation()">
                                <div class="flex items-center gap-3 mb-2">
                                    <img src="${getFavicon(bookmark.url)}" alt="" class="w-10 h-10 rounded-lg" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                                    <div class="w-10 h-10 rounded-lg bg-white/10 flex items-center justify-center hidden">
                                        <i class="fa fa-globe text-white/80"></i>
                                    </div>
                                    <h3 class="font-semibold text-white truncate">${bookmark.name}</h3>
                                </div>
                                <p class="text-sm text-white/80 line-clamp-2">${bookmark.desc}</p>
                            </a>
                        `;
                        // 拖拽事件
                        card.addEventListener('dragstart', (e) => {
                            draggedBookmarkId = bookmark.id;
                            card.classList.add('dragging');
                            e.dataTransfer.effectAllowed = 'move';
                        });
                        card.addEventListener('dragend', () => {
                            card.classList.remove('dragging');
                        });
                        catGrid.appendChild(card);
                    });

                    group.appendChild(catGrid);
                    grid.appendChild(group);

                    // 绑定分组标题的拖拽事件
                    groupTitle.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        groupTitle.classList.add('drag-over');
                    });
                    groupTitle.addEventListener('dragleave', () => {
                        groupTitle.classList.remove('drag-over');
                    });
                    groupTitle.addEventListener('drop', (e) => {
                        e.preventDefault();
                        groupTitle.classList.remove('drag-over');
                        handleDropToCategory(groupTitle.dataset.categoryName);
                    });
                });
            } else {
                // 单个分类，正常显示
                const catBookmarks = filtered.filter(b => b.category === currentCategory);
                const catGrid = document.createElement('div');
                catGrid.className = 'grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4';

                if (catBookmarks.length === 0) {
                    catGrid.innerHTML = `
                        <div class="col-span-full text-center py-12 text-white">
                            <i class="fa fa-folder-open-o text-4xl mb-3"></i>
                            <p>该分类下暂无书签，点击右上角添加吧~</p>
                        </div>
                    `;
                } else {
                    catBookmarks.forEach(bookmark => {
                        const card = document.createElement('div');
                        card.className = 'bg-white/20 backdrop-blur-sm rounded-xl p-4 shadow-lg hover:shadow-xl hover:bg-white/30 transition group relative cursor-move';
                        card.draggable = true;
                        card.dataset.bookmarkId = bookmark.id;
                        card.innerHTML = `
                            <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition flex gap-1">
                                <button data-edit="${bookmark.id}" class="w-6 h-6 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-white">
                                    <i class="fa fa-pencil text-xs"></i>
                                </button>
                                <button data-delete="${bookmark.id}" class="w-6 h-6 rounded-full bg-white/10 hover:bg-red-500/30 flex items-center justify-center text-white hover:text-red-300">
                                    <i class="fa fa-trash text-xs"></i>
                                </button>
                            </div>
                            <a href="${bookmark.url}" target="_blank" class="block" onclick="event.stopPropagation()">
                                <div class="flex items-center gap-3 mb-2">
                                    <img src="${getFavicon(bookmark.url)}" alt="" class="w-10 h-10 rounded-lg" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                                    <div class="w-10 h-10 rounded-lg bg-white/10 flex items-center justify-center hidden">
                                        <i class="fa fa-globe text-white/80"></i>
                                    </div>
                                    <h3 class="font-semibold text-white truncate">${bookmark.name}</h3>
                                </div>
                                <p class="text-sm text-white/80 line-clamp-2">${bookmark.desc || '点击访问网站'}</p>
                            </a>
                        `;
                        // 拖拽事件
                        card.addEventListener('dragstart', (e) => {
                            draggedBookmarkId = bookmark.id;
                            card.classList.add('dragging');
                            e.dataTransfer.effectAllowed = 'move';
                        });
                        card.addEventListener('dragend', () => {
                            card.classList.remove('dragging');
                        });
                        catGrid.appendChild(card);
                    });
                }

                grid.appendChild(catGrid);
            }

            // 绑定编辑删除事件
            grid.querySelectorAll('[data-edit]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    editBookmark(btn.dataset.edit);
                });
            });
            grid.querySelectorAll('[data-delete]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    deleteBookmark(btn.dataset.delete);
                });
            });
        }

        // 保存数据
        function saveData() {
            // 先保存到本地
            localStorage.setItem('my_bookmarks', JSON.stringify(bookmarks));
            localStorage.setItem('my_categories', JSON.stringify(categories));
            // 然后同步到WebDAV
            triggerSync();
        }

        // 打开添加书签弹窗
        function openBookmarkModal() {
            const modal = document.getElementById('bookmark-modal');
            const form = document.getElementById('bookmark-form');
            const title = document.getElementById('modal-title');
            
            // 重置表单
            form.reset();
            document.getElementById('bookmark-id').value = '';
            title.textContent = '添加新书签';
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        // 编辑书签
        function editBookmark(id) {
            const bookmark = bookmarks.find(b => b.id === id);
            if (!bookmark) return;

            const modal = document.getElementById('bookmark-modal');
            const form = document.getElementById('bookmark-form');
            const title = document.getElementById('modal-title');
            
            // 填充数据
            document.getElementById('bookmark-id').value = bookmark.id;
            document.getElementById('bookmark-name').value = bookmark.name;
            document.getElementById('bookmark-url').value = bookmark.url;
            document.getElementById('bookmark-category').value = bookmark.category;
            document.getElementById('bookmark-desc').value = bookmark.desc || '';
            
            title.textContent = '编辑书签';
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        // 删除书签
        async function deleteBookmark(id) {
            if (!confirm('确定要删除这个书签吗？')) return;
            bookmarks = bookmarks.filter(b => b.id !== id);
            saveData();
            renderBookmarks();
        }

        // 关闭书签弹窗
        function closeBookmarkModal() {
            const modal = document.getElementById('bookmark-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // 打开分类弹窗
        function openCategoryModal() {
            const modal = document.getElementById('category-modal');
            document.getElementById('category-form').reset();
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        // 关闭分类弹窗
        function closeCategoryModal() {
            const modal = document.getElementById('category-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // 关闭WebDAV弹窗
        function closeWebDAVModal() {
            const modal = document.getElementById('webdav-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // 处理书签导入
        async function handleImportFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(event) {
                const html = event.target.result;
                // 解析HTML内容
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const links = doc.querySelectorAll('a');
                let addedCount = 0;

                links.forEach(link => {
                    const url = link.href;
                    const name = link.textContent.trim();
                    // 过滤无效链接
                    if (!url || !name || url.startsWith('javascript:') || url.startsWith('file:')) return;

                    // 提取对应的分类（文件夹名称）
                    let category = '导入的书签';
                    let parent = link.parentElement;
                    while (parent) {
                        const folderTitle = parent.querySelector('h3');
                        if (folderTitle) {
                            category = folderTitle.textContent.trim();
                            break;
                        }
                        parent = parent.parentElement;
                    }

                    // 添加新分类
                    if (!categories.includes(category)) {
                        categories.push(category);
                    }

                    // 避免重复导入
                    const exists = bookmarks.find(b => b.url === url);
                    if (!exists) {
                        bookmarks.push({
                            id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
                            name: name,
                            url: url,
                            category: category,
                            desc: ''
                        });
                        addedCount++;
                    }
                });

                // 保存
                saveData();
                renderCategories();
                renderBookmarks();
                alert(`导入完成！成功添加了 ${addedCount} 个新书签，自动创建了对应的分类。`);
                // 重置输入，方便下次导入
                e.target.value = '';
            };
            reader.readAsText(file);
        }

        // 初始化
        async function init() {
            initStarCanvas();

            // 先加载本地数据
            const localBookmarks = localStorage.getItem('my_bookmarks');
            const localCategories = localStorage.getItem('my_categories');
            if (localBookmarks) {
                bookmarks = JSON.parse(localBookmarks);
            }
            if (localCategories) {
                categories = JSON.parse(localCategories);
            }

            // 如果有WebDAV配置，尝试加载云端数据
            if (webdavConfig) {
                try {
                    await loadFromWebDAV();
                    // 启动定时同步，检查更新
                    setInterval(async () => {
                        await loadFromWebDAV();
                        renderCategories();
                        renderBookmarks();
                    }, 30000); // 30秒检查一次更新
                } catch (e) {
                    console.error('WebDAV加载失败', e);
                }
            }

            // 隐藏加载，显示内容
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');

            renderCategories();
            renderBookmarks();

            // 绑定事件
            document.getElementById('add-bookmark-btn').addEventListener('click', openBookmarkModal);
            document.getElementById('close-modal-btn').addEventListener('click', closeBookmarkModal);
            document.getElementById('add-category-btn').addEventListener('click', openCategoryModal);
            document.getElementById('close-category-modal-btn').addEventListener('click', closeCategoryModal);
            document.getElementById('webdav-setting-btn').addEventListener('click', () => {
                // 填充现有配置
                if (webdavConfig) {
                    document.getElementById('webdav-url').value = webdavConfig.url;
                    document.getElementById('webdav-username').value = webdavConfig.username;
                }
                document.getElementById('webdav-modal').classList.remove('hidden');
                document.getElementById('webdav-modal').classList.add('flex');
            });
            document.getElementById('close-webdav-btn').addEventListener('click', closeWebDAVModal);

            // WebDAV表单提交
            document.getElementById('webdav-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const url = document.getElementById('webdav-url').value;
                const username = document.getElementById('webdav-username').value;
                const password = document.getElementById('webdav-password').value;
                webdavConfig = { url, username, password };
                localStorage.setItem('webdav_config', JSON.stringify(webdavConfig));
                // 尝试加载
                try {
                    const loaded = await loadFromWebDAV();
                    if (loaded) {
                        renderCategories();
                        renderBookmarks();
                        alert('连接成功！同步已开启，你的书签会自动同步到你的云盘。');
                    } else {
                        alert('连接成功，第一次使用，会自动把你的书签同步到云盘。');
                        await saveToWebDAV();
                    }
                    // 启动定时同步
                    setInterval(async () => {
                        await loadFromWebDAV();
                        renderCategories();
                        renderBookmarks();
                    }, 30000);
                } catch (e) {
                    alert('连接失败，请检查你的地址、账号密码是否正确。');
                    webdavConfig = null;
                    localStorage.removeItem('webdav_config');
                }
                closeWebDAVModal();
            });

            // 导入书签事件
            document.getElementById('import-bookmark-btn').addEventListener('click', () => {
                document.getElementById('import-file-input').click();
            });
            document.getElementById('import-file-input').addEventListener('change', handleImportFile);

            // 搜索事件
            document.getElementById('search-input').addEventListener('input', (e) => {
                searchKeyword = e.target.value;
                renderBookmarks();
            });

            // 书签表单提交
            document.getElementById('bookmark-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const id = document.getElementById('bookmark-id').value;
                const name = document.getElementById('bookmark-name').value;
                let url = document.getElementById('bookmark-url').value;
                // 补全协议
                if (!url.startsWith('http')) {
                    url = 'https://' + url;
                }
                const category = document.getElementById('bookmark-category').value;
                const desc = document.getElementById('bookmark-desc').value;

                if (id) {
                    // 编辑
                    const index = bookmarks.findIndex(b => b.id === id);
                    if (index !== -1) {
                        bookmarks[index] = { ...bookmarks[index], name, url, category, desc };
                    }
                } else {
                    // 添加
                    bookmarks.push({
                        id: Date.now().toString(),
                        name,
                        url,
                        category,
                        desc
                    });
                }

                saveData();
                renderBookmarks();
                closeBookmarkModal();
            });

            // 分类表单提交
            document.getElementById('category-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('category-name').value;
                if (!categories.includes(name)) {
                    categories.push(name);
                    saveData();
                    renderCategories();
                }
                closeCategoryModal();
            });

            // 点击遮罩关闭弹窗
            document.getElementById('bookmark-modal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeBookmarkModal();
            });
            document.getElementById('category-modal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeCategoryModal();
            });
            document.getElementById('webdav-modal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeWebDAVModal();
            });
        }

        // 启动
        init();
    </script>
</body>
</html>
